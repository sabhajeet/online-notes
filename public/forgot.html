<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>

    /* Center auth pages */
body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Card */
.auth-container {
  background: #fff;
  padding: 30px;
  width: 350px;
  border-radius: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  text-align: center;
}

/* Heading */
.auth-container h2 {
  margin-bottom: 10px;
}

/* Sub text */
.sub-text {
  font-size: 14px;
  color: #666;
  margin-bottom: 20px;
}

/* Input */
.auth-container input {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
  border: 1px solid #ccc;
  border-radius: 6px;
}

/* Button */
.auth-container button {
  width: 100%;
  padding: 10px;
  background: #007bff;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

.auth-container button:hover {
  background: #0056b3;
}

/* Back link */
.back-link {
  margin-top: 15px;
}

.back-link a {
  text-decoration: none;
  color: #007bff;
  font-size: 14px;
}

</style>

</head>
<body>

<div class="auth-container">
  <h2>Forgot Password</h2>
  <p class="sub-text">Enter your email to receive a reset link</p>

  <form action="/auth/forgot-password" method="POST">
    <input type="email" name="email" placeholder="Enter your email" required />
    <button type="submit">Send Reset Link</button>
  </form>

  <p class="back-link">
    <a href="/login.html">Back to Login</a>
  </p>
</div>

</body>
</html>
